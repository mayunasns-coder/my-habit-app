<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="習慣ログ">
<title>習慣ログ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8e9f0;
    --muted: #7a7e99;
    --accent: #4ade9b;
    --accent-dim: rgba(74,222,155,0.12);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.12);
    --danger: rgba(255,90,90,0.7);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 0 80px;
  }

  header {
    padding: 48px 20px 20px;
  }
  header h1 {
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .tabs {
    display: flex;
    padding: 0 20px;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .tab {
    padding: 10px 16px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .section { display: none; padding: 0 20px; }
  .section.active { display: block; }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-num { font-size: 28px; font-weight: 500; font-family: 'DM Mono', monospace; color: var(--text); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .input-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .input-row input:focus { border-color: var(--border2); }
  .input-row input::placeholder { color: var(--muted); }
  .input-row button {
    padding: 10px 16px;
    background: var(--accent-dim);
    border: 1px solid rgba(74,222,155,0.25);
    border-radius: var(--radius-sm);
    color: var(--accent);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .input-row button:hover { background: rgba(74,222,155,0.2); }

  .item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    transition: border-color 0.15s;
    animation: fadeIn 0.2s ease;
  }
  .item:hover { border-color: var(--border2); }
  .item.done { opacity: 0.5; }
  .item.done .label { text-decoration: line-through; color: var(--muted); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .check.checked { background: var(--accent); border-color: var(--accent); }
  .check.checked::after {
    content: '';
    width: 5px; height: 9px;
    border: 2px solid #0f1117;
    border-top: none; border-left: none;
    transform: rotate(40deg) translate(-1px, -1px);
    display: block;
  }
  .label { flex: 1; font-size: 14px; line-height: 1.4; }
  .del {
    width: 28px; height: 28px;
    border: none; background: none;
    color: var(--muted); cursor: pointer;
    font-size: 18px; line-height: 1;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .del:hover { color: var(--danger); background: rgba(255,90,90,0.1); }

  .empty {
    text-align: center;
    padding: 40px 0;
    color: var(--muted);
    font-size: 14px;
  }

  .habit-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    padding: 12px 14px;
    animation: fadeIn 0.2s ease;
    transition: border-color 0.15s;
  }
  .habit-item:hover { border-color: var(--border2); }
  .habit-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .habit-label { flex: 1; font-size: 14px; }
  .streak {
    font-size: 12px; font-family: 'DM Mono', monospace;
    color: var(--amber);
    background: var(--amber-dim);
    padding: 2px 8px; border-radius: 20px;
  }
  .dots-row { display: flex; gap: 5px; align-items: center; }
  .dot-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .dot-day { font-size: 10px; color: var(--muted); }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .dot.done { background: var(--accent); border-color: var(--accent); }
  .dot.today { border-color: var(--accent); }

  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(15,17,23,0.92);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    max-width: 430px;
    margin: 0 auto;
  }
  /* fix nav centering on wider screens */
  @media (min-width: 430px) {
    nav { left: 50%; transform: translateX(-50%); width: 430px; }
  }
  .nav-btn {
    flex: 1; padding: 14px;
    background: none; border: none;
    color: var(--muted); font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; line-height: 1; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>習慣ログ</h1>
    <p id="date-label"></p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('todo')">ToDoリスト</button>
    <button class="tab" onclick="switchTab('habit')">習慣トラッカー</button>
  </div>

  <div id="todo" class="section active">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="todo-total">0</div><div class="stat-label">タスク合計</div></div>
      <div class="stat"><div class="stat-num" id="todo-done-count">0</div><div class="stat-label">完了済み</div></div>
    </div>
    <div class="input-row">
      <input id="todo-input" placeholder="新しいタスクを追加..." onkeydown="if(event.key==='Enter')addTodo()">
      <button onclick="addTodo()">+ 追加</button>
    </div>
    <div id="todo-list"></div>
  </div>

  <div id="habit" class="section">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="habit-total">0</div><div class="stat-label">習慣数</div></div>
      <div class="stat"><div class="stat-num" id="habit-best">0</div><div class="stat-label">最長連続日数</div></div>
    </div>
    <div class="input-row">
      <input id="habit-input" placeholder="新しい習慣を追加..." onkeydown="if(event.key==='Enter')addHabit()">
      <button onclick="addHabit()">+ 追加</button>
    </div>
    <div id="habit-list"></div>
  </div>
</div>

<script>
const DAYS = 7;
let state = { todos: [], habits: [] };
try { const s = localStorage.getItem('habit-log-v1'); if(s) state = JSON.parse(s); } catch(e){}

function save() { try { localStorage.setItem('habit-log-v1', JSON.stringify(state)); } catch(e){} }
function dayKey(offset) {
  const d = new Date(); d.setDate(d.getDate() - offset);
  return d.toISOString().slice(0,10);
}
function dayShort(offset) {
  const d = new Date(); d.setDate(d.getDate() - offset);
  return ['日','月','火','水','木','金','土'][d.getDay()];
}
function today() { return dayKey(0); }

// Date label
const now = new Date();
document.getElementById('date-label').textContent =
  now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日（' + ['日','月','火','水','木','金','土'][now.getDay()] + '）';

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['todo','habit'][i]===tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
}

// Todo
function addTodo() {
  const inp = document.getElementById('todo-input');
  const text = inp.value.trim(); if(!text) return;
  state.todos.push({ id: Date.now(), text, done: false });
  inp.value = ''; save(); renderTodos();
}
function toggleTodo(id) {
  const t = state.todos.find(t=>t.id===id); if(t) t.done = !t.done;
  save(); renderTodos();
}
function delTodo(id) {
  state.todos = state.todos.filter(t=>t.id!==id);
  save(); renderTodos();
}
function renderTodos() {
  const active = state.todos.filter(t=>!t.done);
  const done = state.todos.filter(t=>t.done);
  document.getElementById('todo-total').textContent = state.todos.length;
  document.getElementById('todo-done-count').textContent = done.length;
  const list = document.getElementById('todo-list');
  if(!state.todos.length) { list.innerHTML='<div class="empty">タスクを追加してみましょう</div>'; return; }
  list.innerHTML = [...active,...done].map(t=>`
    <div class="item${t.done?' done':''}">
      <div class="check${t.done?' checked':''}" onclick="toggleTodo(${t.id})"></div>
      <span class="label">${escHtml(t.text)}</span>
      <button class="del" onclick="delTodo(${t.id})">×</button>
    </div>`).join('');
}

// Habit
function addHabit() {
  const inp = document.getElementById('habit-input');
  const text = inp.value.trim(); if(!text) return;
  state.habits.push({ id: Date.now(), text, log: {} });
  inp.value = ''; save(); renderHabits();
}
function toggleHabit(id, key) {
  const h = state.habits.find(h=>h.id===id); if(!h) return;
  h.log[key] = !h.log[key];
  save(); renderHabits();
}
function delHabit(id) {
  state.habits = state.habits.filter(h=>h.id!==id);
  save(); renderHabits();
}
function getStreak(log) {
  let s=0;
  for(let i=0;i<60;i++) { if(log[dayKey(i)]) s++; else break; }
  return s;
}
function renderHabits() {
  document.getElementById('habit-total').textContent = state.habits.length;
  const best = state.habits.reduce((m,h)=>Math.max(m,getStreak(h.log)),0);
  document.getElementById('habit-best').textContent = best;
  const list = document.getElementById('habit-list');
  if(!state.habits.length) { list.innerHTML='<div class="empty">習慣を追加してみましょう</div>'; return; }
  const days = Array.from({length:DAYS},(_,i)=>DAYS-1-i);
  list.innerHTML = state.habits.map(h=>{
    const streak = getStreak(h.log);
    const dots = days.map(i=>{
      const k=dayKey(i);
      return `<div class="dot-wrap">
        <div class="dot${h.log[k]?' done':''}${i===0?' today':''}" onclick="toggleHabit(${h.id},'${k}')"></div>
        <span class="dot-day">${dayShort(i)}</span>
      </div>`;
    }).join('');
    return `<div class="habit-item">
      <div class="habit-top">
        <span class="habit-label">${escHtml(h.text)}</span>
        ${streak>0?`<span class="streak">${streak}日連続</span>`:''}
        <button class="del" onclick="delHabit(${h.id})">×</button>
      </div>
      <div class="dots-row">${dots}</div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderTodos(); renderHabits();
</script>
</body>
</html>
